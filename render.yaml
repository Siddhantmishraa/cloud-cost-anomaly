services:
  - type: web
    name: cloud-cost-anomaly-detection
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python main.py
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "10000"
